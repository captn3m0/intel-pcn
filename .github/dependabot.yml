version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      time: "04:00"
      timezone: Asia/Calcutta
    cooldown:
      default-days: 7
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      time: "04:00"
      interval: weekly
      timezone: Asia/Calcutta
    cooldown:
      default-days: 7
  - package-ecosystem: "bundler"
    vendor: true
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7